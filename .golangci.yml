version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - bodyclose
    - nilerr
    - prealloc
    - unconvert
    - unparam

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam # k8s types are large by design

    misspell:
      locale: US

    govet:
      enable-all: true
      disable:
        - fieldalignment # not worth the noise for this project

  exclusions:
    rules:
      # Test files can have longer functions and unused params
      - path: _test\.go
        linters:
          - unparam
          - gocritic

      # cmd package uses global vars for cobra flags (by design)
      - path: cmd/
        text: "global"
        linters:
          - gocritic

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

formatters:
  enable:
    - gofmt
