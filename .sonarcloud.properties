# Configuration for SonarCloud Automatic Analysis
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis

# Exclude example/demo files — they contain intentionally fake placeholder secrets
sonar.exclusions=examples/**

# Disable "use full commit SHA" rule for GitHub Actions — we prefer readable version tags
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=github-actions:S7114
sonar.issue.ignore.multicriteria.e1.resourceKey=.github/workflows/**
sonar.issue.ignore.multicriteria.e2.ruleKey=github-actions:S7637
sonar.issue.ignore.multicriteria.e2.resourceKey=.github/workflows/**
