name: litellm-n8n-shared-pg

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shared
      POSTGRES_PASSWORD: shared-secret
      POSTGRES_DB: shared
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shared"]
      interval: 5s
      timeout: 3s
      retries: 10
    x-exports:
      host: postgres
      port: "5432"
      user: shared
      password: shared-secret
      database: shared

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    environment:
      DATABASE_URL: "postgresql://${postgres.user}:${postgres.password}@${postgres.host}:${postgres.port}/${postgres.database}"
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: "sk-1234"
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    x-exports:
      host: litellm
      port: "4000"
      master_key: sk-1234

  n8n:
    image: n8nio/n8n:latest
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: "${postgres.host}"
      DB_POSTGRESDB_PORT: "${postgres.port}"
      DB_POSTGRESDB_USER: "${postgres.user}"
      DB_POSTGRESDB_PASSWORD: "${postgres.password}"
      DB_POSTGRESDB_DATABASE: "${postgres.database}"
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_DIAGNOSTICS_ENABLED: "false"
      GENERIC_TIMEZONE: "Europe/Amsterdam"
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      - postgres
