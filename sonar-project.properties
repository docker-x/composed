sonar.projectKey=docker-x_composed
sonar.organization=docker-x
sonar.go.coverage.reportPaths=coverage.out

# Exclude example/demo files — they contain intentionally fake placeholder secrets
sonar.exclusions=examples/**

# Exclude CLI glue code from coverage — cobra handlers calling external tools
# (helm, docker compose) are best tested via integration tests, not unit tests
sonar.coverage.exclusions=cmd/build.go,cmd/config.go,cmd/resolve.go,internal/helm/**
