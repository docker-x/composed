sonar.projectKey=docker-x_composed
sonar.organization=docker-x
sonar.go.coverage.reportPaths=coverage.out

# Exclude example/demo files — they contain intentionally fake placeholder secrets
sonar.exclusions=examples/**

# Exclude CLI glue code from coverage — cobra handlers calling external tools
# (helm, docker compose, OCI registries) are best tested via integration tests.
# Exclude test files — Go coverage only instruments source, not *_test.go.
sonar.coverage.exclusions=cmd/build.go,cmd/config.go,cmd/resolve.go,cmd/oci.go,cmd/root.go,internal/helm/**,**/*_test.go,main.go
