version: 2

project_name: composed

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: composed
    main: .
    binary: composed
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - DESIGN.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

homebrew_casks:
  - name: composed
    homepage: https://github.com/docker-x/composed
    description: Compose anything into a Docker Compose file
    repository:
      owner: docker-x
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    url:
      verified: github.com/docker-x/composed
    hooks:
      post:
        install: system "xattr", "-r", "-d", "com.apple.quarantine", "#{caskroom}"
    zap:
      trash:
        - "~/.config/composed"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^.*feat.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix.*$"
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: docker-x
    name: composed
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  header: |
    ## What's Changed

    Install with:
    ```bash
    brew install docker-x/tap/composed
    ```

    Or with Go:
    ```bash
    go install github.com/docker-x/composed@{{ .Tag }}
    ```

    Or download a binary from the assets below.
  footer: |
    **Full Changelog**: https://github.com/docker-x/composed/compare/{{ .PreviousTag }}...{{ .Tag }}
